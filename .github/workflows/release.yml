name: Release Sts2SeedRoller

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Extract version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "versionSuffix=-$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore Sts2SeedRoller.sln

      - name: Build
        run: dotnet build Sts2SeedRoller.sln -c Release --no-restore

      - name: Publish UI (Regular)
        run: |
          dotnet publish src/SeedUi/SeedUi.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o src/SeedUi/bin/Release/net9.0-windows/win-x64/publish `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Publish CLI (Regular)
        run: |
          dotnet publish src/SeedCli/SeedCli.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o src/SeedCli/bin/Release/net9.0/win-x64/publish `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Copy data files to publish directories
        run: |
          # Regular UI publish: CopySeedData puts data in build output, not publish output
          $uiBuildOut = Join-Path $env:GITHUB_WORKSPACE 'src/SeedUi/bin/Release/net9.0-windows'
          $uiPublish = Join-Path $env:GITHUB_WORKSPACE 'src/SeedUi/bin/Release/net9.0-windows/win-x64/publish'
          if (Test-Path (Join-Path $uiBuildOut 'data')) {
            $dest = Join-Path $uiPublish 'data'
            if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
            Copy-Item -Recurse -Path (Join-Path $uiBuildOut 'data') -Destination $uiPublish
          }

          # Regular CLI publish: same issue
          $cliBuildOut = Join-Path $env:GITHUB_WORKSPACE 'src/SeedCli/bin/Release/net9.0'
          $cliPublish = Join-Path $env:GITHUB_WORKSPACE 'src/SeedCli/bin/Release/net9.0/win-x64/publish'
          if (Test-Path (Join-Path $cliBuildOut 'data')) {
            $dest = Join-Path $cliPublish 'data'
            if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
            Copy-Item -Recurse -Path (Join-Path $cliBuildOut 'data') -Destination $cliPublish
          }

      - name: Publish UI (Single File)
        run: |
          $uiDir = Join-Path $env:GITHUB_WORKSPACE 'src/SeedUi/bin/Release/net9.0-windows'
          # 清理并复制 data
          if (Test-Path (Join-Path $uiDir 'data')) { Remove-Item (Join-Path $uiDir 'data') -Recurse -Force }
          Copy-Item -Recurse -Path data -Destination $uiDir
          # 复制 Assets（图标准备）
          $assetsSrc = Join-Path $env:GITHUB_WORKSPACE 'src/SeedUi/Assets'
          if (Test-Path $assetsSrc) {
            $assetsDest = Join-Path $uiDir 'Assets'
            if (Test-Path $assetsDest) { Remove-Item $assetsDest -Recurse -Force }
            Copy-Item -Recurse -Path $assetsSrc -Destination $uiDir
          }
          dotnet publish src/SeedUi/SeedUi.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o src/SeedUi/bin/Release/net9.0-windows/win-x64/single-publish `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:PublishSingleFile=true `
            /p:IncludeAllContentForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true

      - name: Publish CLI (Single File)
        run: |
          $cliDir = Join-Path $env:GITHUB_WORKSPACE 'src/SeedCli/bin/Release/net9.0'
          if (Test-Path (Join-Path $cliDir 'data')) { Remove-Item (Join-Path $cliDir 'data') -Recurse -Force }
          Copy-Item -Recurse -Path data -Destination $cliDir
          dotnet publish src/SeedCli/SeedCli.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o src/SeedCli/bin/Release/net9.0/win-x64/single-publish `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:PublishSingleFile=true `
            /p:IncludeAllContentForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true

      - name: Package Regular UI artifact
        id: package-ui
        shell: pwsh
        run: |
          $vs = "${{ steps.version.outputs.versionSuffix }}"
          $uiPublish = Join-Path $env:GITHUB_WORKSPACE 'src/SeedUi/bin/Release/net9.0-windows/win-x64/publish'
          if (-not (Test-Path $uiPublish)) { Write-Error "发布目录不存在: $uiPublish" }

          $packageRoot = Join-Path $env:GITHUB_WORKSPACE 'sts2seedroller-package'
          if (Test-Path $packageRoot) { Remove-Item $packageRoot -Recurse -Force }
          $uiDest = Join-Path $packageRoot "Sts2SeedRoller"
          New-Item -ItemType Directory -Path $uiDest -Force | Out-Null
          Copy-Item -Path (Join-Path $uiPublish '*') -Destination $uiDest -Recurse -Force

          $shortcutPath = Join-Path $packageRoot "Sts2SeedRoller.lnk"
          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut($shortcutPath)
          $exePath = Join-Path $uiDest "Sts2SeedRollerUi.exe"
          $shortcut.TargetPath = $exePath
          $shortcut.WorkingDirectory = $uiDest
          $shortcut.IconLocation = "$exePath,0"
          $shortcut.Save()

          $zipName = "sts2seedroller-win-x64$vs.zip"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE $zipName
          Compress-Archive -Path (Join-Path $packageRoot '*') -DestinationPath $zipPath -Force
          "artifactPath=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package Regular CLI artifact
        id: package-cli
        shell: pwsh
        run: |
          $vs = "${{ steps.version.outputs.versionSuffix }}"
          $cliPublish = Join-Path $env:GITHUB_WORKSPACE 'src/SeedCli/bin/Release/net9.0/win-x64/publish'
          if (-not (Test-Path $cliPublish)) { Write-Error "CLI 发布目录不存在: $cliPublish" }

          $cliRoot = Join-Path $env:GITHUB_WORKSPACE 'sts2seedroller-cli-package'
          if (Test-Path $cliRoot) { Remove-Item $cliRoot -Recurse -Force }
          New-Item -ItemType Directory -Path $cliRoot -Force | Out-Null
          Copy-Item -Path (Join-Path $cliPublish '*') -Destination $cliRoot -Recurse -Force

          $zipName = "sts2seedroller-cli-win-x64$vs.zip"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE $zipName
          Compress-Archive -Path (Join-Path $cliRoot '*') -DestinationPath $zipPath -Force
          "artifactPath=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package Single-File artifact
        id: package-single
        shell: pwsh
        run: |
          $vs = "${{ steps.version.outputs.versionSuffix }}"
          $uiSingle = Join-Path $env:GITHUB_WORKSPACE 'src/SeedUi/bin/Release/net9.0-windows/win-x64/single-publish'
          $cliSingle = Join-Path $env:GITHUB_WORKSPACE 'src/SeedCli/bin/Release/net9.0/win-x64/single-publish'
          if (-not (Test-Path $uiSingle)) { Write-Error "单文件发布目录不存在: $uiSingle" }
          if (-not (Test-Path $cliSingle)) { Write-Error "CLI 单文件发布目录不存在: $cliSingle" }

          # UI 单文件 exe：复制并重命名
          $uiExe = Join-Path $uiSingle "Sts2SeedRollerUi$vs.exe"
          if (-not (Test-Path (Join-Path $uiSingle 'Sts2SeedRollerUi.exe'))) { Write-Error "UI 单文件 exe 不存在" }
          Copy-Item -Path (Join-Path $uiSingle 'Sts2SeedRollerUi.exe') -Destination $uiExe -Force
          "uiExePath=$uiExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          # CLI 单文件 exe：复制并重命名
          $cliExe = Join-Path $cliSingle "Sts2SeedRoller$vs.exe"
          if (-not (Test-Path (Join-Path $cliSingle 'Sts2SeedRoller.exe'))) { Write-Error "CLI 单文件 exe 不存在" }
          Copy-Item -Path (Join-Path $cliSingle 'Sts2SeedRoller.exe') -Destination $cliExe -Force
          "cliExePath=$cliExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Regular UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2seedroller-win-x64${{ steps.version.outputs.versionSuffix }}
          path: ${{ steps.package-ui.outputs.artifactPath }}

      - name: Upload Regular CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2seedroller-cli-win-x64${{ steps.version.outputs.versionSuffix }}
          path: ${{ steps.package-cli.outputs.artifactPath }}

      - name: Upload Single-File UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2seedroller-single-win-x64${{ steps.version.outputs.versionSuffix }}
          path: ${{ steps.package-single.outputs.uiExePath }}

      - name: Upload Single-File CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2seedroller-cli-single-win-x64${{ steps.version.outputs.versionSuffix }}
          path: ${{ steps.package-single.outputs.cliExePath }}

      - name: Create release notes
        id: create-release-notes
        run: pwsh -File .github/workflows/generate-release-notes.ps1 "${{ github.ref_name }}" "${{ steps.version.outputs.versionSuffix }}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: ${{ steps.create-release-notes.outputs.releaseNotesPath }}
          tag_name: ${{ github.ref_name }}
          files: |
            sts2seedroller-win-x64${{ steps.version.outputs.versionSuffix }}.zip
            sts2seedroller-cli-win-x64${{ steps.version.outputs.versionSuffix }}.zip
            Sts2SeedRollerUi${{ steps.version.outputs.versionSuffix }}.exe
            Sts2SeedRoller${{ steps.version.outputs.versionSuffix }}.exe
          draft: false
          prerelease: false
