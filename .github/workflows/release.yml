name: Release Sts2SeedRoller

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      BUILD_CONFIGURATION: Release
      RUNTIME_IDENTIFIER: win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Compute release metadata
        id: meta
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $releaseAssetsDir = Join-Path $env:RUNNER_TEMP 'release-assets'

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "releaseAssetsDir=$releaseAssetsDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore Sts2SeedRoller.sln

      - name: Build
        run: dotnet build Sts2SeedRoller.sln -c $env:BUILD_CONFIGURATION --no-restore

      - name: Publish UI
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'publish-ui'
          if (Test-Path $publishDir) {
            Remove-Item $publishDir -Recurse -Force
          }

          dotnet publish src/SeedUi/SeedUi.csproj `
            -c $env:BUILD_CONFIGURATION `
            -r $env:RUNTIME_IDENTIFIER `
            --self-contained true `
            -o $publishDir `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Publish CLI
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'publish-cli'
          if (Test-Path $publishDir) {
            Remove-Item $publishDir -Recurse -Force
          }

          dotnet publish src/SeedCli/SeedCli.csproj `
            -c $env:BUILD_CONFIGURATION `
            -r $env:RUNTIME_IDENTIFIER `
            --self-contained true `
            -o $publishDir `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Create release packages
        id: package
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $releaseAssetsDir = "${{ steps.meta.outputs.releaseAssetsDir }}"
          $uiPublishDir = Join-Path $env:RUNNER_TEMP 'publish-ui'
          $cliPublishDir = Join-Path $env:RUNNER_TEMP 'publish-cli'
          $uiPackageDir = Join-Path $env:RUNNER_TEMP 'package-ui'
          $cliPackageDir = Join-Path $env:RUNNER_TEMP 'package-cli'

          foreach ($dir in @($releaseAssetsDir, $uiPackageDir, $cliPackageDir)) {
            if (Test-Path $dir) {
              Remove-Item $dir -Recurse -Force
            }
          }

          New-Item -ItemType Directory -Path $releaseAssetsDir -Force | Out-Null

          $uiAppRoot = Join-Path $uiPackageDir 'Sts2SeedRoller'
          New-Item -ItemType Directory -Path $uiAppRoot -Force | Out-Null
          Copy-Item -Path (Join-Path $uiPublishDir '*') -Destination $uiAppRoot -Recurse -Force
          Copy-Item -Path 'data' -Destination $uiAppRoot -Recurse -Force
          Copy-Item -Path 'README.md' -Destination $uiAppRoot -Force

          $cliAppRoot = Join-Path $cliPackageDir 'Sts2SeedRoller-CLI'
          New-Item -ItemType Directory -Path $cliAppRoot -Force | Out-Null
          Copy-Item -Path (Join-Path $cliPublishDir '*') -Destination $cliAppRoot -Recurse -Force
          Copy-Item -Path 'data' -Destination $cliAppRoot -Recurse -Force
          Copy-Item -Path 'README.md' -Destination $cliAppRoot -Force

          $uiZip = Join-Path $releaseAssetsDir "sts2seedroller-win-x64-$version.zip"
          $cliZip = Join-Path $releaseAssetsDir "sts2seedroller-cli-win-x64-$version.zip"

          Compress-Archive -Path $uiAppRoot -DestinationPath $uiZip -Force
          Compress-Archive -Path $cliAppRoot -DestinationPath $cliZip -Force

          "uiZip=$uiZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "cliZip=$cliZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload UI package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2seedroller-win-x64-${{ steps.meta.outputs.version }}
          path: ${{ steps.package.outputs.uiZip }}
          retention-days: 14

      - name: Upload CLI package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2seedroller-cli-win-x64-${{ steps.meta.outputs.version }}
          path: ${{ steps.package.outputs.cliZip }}
          retention-days: 14

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $version = "${{ steps.meta.outputs.version }}"
          $releaseName = "Sts2SeedRoller $version"

          $releaseExists = $true
          gh release view $tag --repo "${{ github.repository }}" | Out-Null
          if ($LASTEXITCODE -ne 0) {
            $releaseExists = $false
          }

          if (-not $releaseExists) {
            gh release create $tag `
              "${{ steps.package.outputs.uiZip }}" `
              "${{ steps.package.outputs.cliZip }}" `
              --repo "${{ github.repository }}" `
              --title $releaseName `
              --generate-notes `
              --verify-tag
            if ($LASTEXITCODE -ne 0) {
              throw "gh release create failed."
            }
            return
          }

          gh release edit $tag `
            --repo "${{ github.repository }}" `
            --title $releaseName
          if ($LASTEXITCODE -ne 0) {
            throw "gh release edit failed."
          }

          gh release upload $tag `
            "${{ steps.package.outputs.uiZip }}" `
            "${{ steps.package.outputs.cliZip }}" `
            --repo "${{ github.repository }}" `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "gh release upload failed."
          }
